# ─────────────────────────────────────────────────────────────────────────────
# Client Deployment + Service
#
# The client is our Nginx container serving the built Vite/React static files.
# It needs no environment variables — it's just HTML/CSS/JS files.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinevision-client
  labels:
    app: cinevision-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinevision-client
  template:
    metadata:
      labels:
        app: cinevision-client
    spec:
      containers:
        - name: client
          # !! REPLACE with your actual Docker Hub / GHCR image path
          image: fawaz482/cinevision-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          # Health check — Nginx returns 200 on /
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          # Nginx is very lightweight — give it minimal resources
          resources:
            requests:
              memory: "32Mi"
              cpu: "30m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# ── Internal Service (ClusterIP) ──────────────────────────────────────────────
# The Ingress routes external HTTP traffic to this service on port 80.
apiVersion: v1
kind: Service
metadata:
  name: cinevision-client
spec:
  selector:
    app: cinevision-client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
