# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes Secrets — Environment Variables for the Server
#
# What is a Secret?
#   A Secret is a Kubernetes object that stores sensitive data (like passwords
#   and API keys). Kubernetes keeps these separate from your application code
#   and images. The server Deployment references this Secret — K8s injects
#   the values as environment variables when the container starts.
#
# IMPORTANT: This file uses placeholder values.
#   You must replace each <REPLACE_...> value with the real Base64-encoded
#   value before applying to the cluster.
#
# How to Base64-encode a value (run in your terminal):
#   echo -n "your-actual-value" | base64
#
# How to apply to the cluster:
#   kubectl apply -f k8s/secrets.yaml
#
# How to verify it was created:
#   kubectl get secret cinevision-secrets
#
# NEVER commit the real values to Git. 
# The CI/CD pipeline (Step 18.4) will create this Secret automatically
# using GitHub Actions Secrets.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cinevision-secrets
type: Opaque
data:
  # ── Database ──────────────────────────────────────────────────────────────
  # echo -n "mongodb+srv://user:pass@cluster.mongodb.net/cinevision" | base64
  MONGODB_URI: <REPLACE_WITH_BASE64_ENCODED_MONGODB_URI>

  # ── JWT Auth ──────────────────────────────────────────────────────────────
  # echo -n "your-super-secure-jwt-secret-min-32-chars" | base64
  JWT_SECRET: <REPLACE_WITH_BASE64_ENCODED_JWT_SECRET>
  # echo -n "7d" | base64
  JWT_EXPIRES_IN: <REPLACE_WITH_BASE64_ENCODED_JWT_EXPIRES_IN>

  # ── AWS S3 (for script uploads) ───────────────────────────────────────────
  # echo -n "AKIAIOSFODNN7EXAMPLE" | base64
  AWS_ACCESS_KEY_ID: <REPLACE_WITH_BASE64_ENCODED_AWS_ACCESS_KEY_ID>
  AWS_SECRET_ACCESS_KEY: <REPLACE_WITH_BASE64_ENCODED_AWS_SECRET_ACCESS_KEY>
  AWS_REGION: <REPLACE_WITH_BASE64_ENCODED_AWS_REGION>
  AWS_S3_BUCKET_NAME: <REPLACE_WITH_BASE64_ENCODED_AWS_S3_BUCKET_NAME>

  # ── Google Gemini AI (for script parsing) ─────────────────────────────────
  GEMINI_API_KEY: <REPLACE_WITH_BASE64_ENCODED_GEMINI_API_KEY>
  # echo -n "gemini-1.5-flash" | base64
  AI_MODEL: <REPLACE_WITH_BASE64_ENCODED_AI_MODEL>

  # ── App Config ────────────────────────────────────────────────────────────
  # echo -n "https://yourdomain.com" | base64
  CLIENT_URL: <REPLACE_WITH_BASE64_ENCODED_CLIENT_URL>
