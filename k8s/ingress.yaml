# ─────────────────────────────────────────────────────────────────────────────
# Ingress — The "Front Door" of the Cluster
#
# What is an Ingress?
#   An Ingress is a set of routing rules that sit at the edge of the cluster
#   and direct incoming internet traffic to the correct internal Service.
#
# Since the frontend is hosted on Vercel, this cluster ONLY serves the API.
# All traffic to this EC2 instance will be routed to the Express Node.js server.
#
# TLS (HTTPS):
#   We use cert-manager with Let's Encrypt to automatically get and renew
#   a free SSL certificate. Install cert-manager on the cluster first.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinevision-ingress
  # annotations:
  #   cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  ingressClassName: traefik
  # ── TLS block (uncomment after cert-manager setup) ──────────────────────────
  # tls:
  #   - hosts:
  #       - api.yourdomain.com            # !! REPLACE with your ACTUAL API subdomain
  #     secretName: cinevision-tls

  rules:
    # !! REPLACE with your actual API domain (e.g., api.yourdomain.com)
    # or use the EC2 public IP for testing.
    - host: api.yourdomain.com
      http:
        paths:
          # Route all traffic to the backend server
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cinevision-server
                port:
                  number: 5000
