name: Deploy Backend to EC2 Docker

# Trigger the workflow when code is pushed to the 'main' branch
# and only when backend files change.
on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          # Tags the image with both the commit SHA and 'latest'
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:latest

      - name: Upload Docker Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/cinevision/"

      - name: Execute Deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the deployment folder
            cd /home/ubuntu/cinevision
            
            # Pull the completely freshly built image
            sudo docker compose -f docker-compose.prod.yml pull
            
            # Gracefully recreate and restart ONLY the changed containers
            sudo docker compose -f docker-compose.prod.yml up -d
            
            # Cleanup old Docker images to free up 8GB EC2 hard drive space
            sudo docker image prune -a -f
