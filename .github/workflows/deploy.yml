name: Deploy Backend to K3s

# Trigger the workflow when code is pushed to the 'main' branch
# and only when files in the 'server' or 'k8s' directories change.
on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          # Tags the image with both the commit SHA (for versioning) and 'latest'
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        # We write the KUBE_CONFIG secret to a temporary file for kubectl to use
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s Cluster
        env:
          IMAGE_TAG: ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:${{ github.sha }}
        run: |
          # 1. Apply the latest Kubernetes manifests (Services, Ingress, etc.)
          kubectl --insecure-skip-tls-verify=true apply -f ./k8s/server-deployment.yaml --validate=false
          kubectl --insecure-skip-tls-verify=true apply -f ./k8s/ingress.yaml --validate=false
          
          # 2. Update the Deployment to use the exact new image tag we just built
          # "sever" is the name of the container inside the deployment yaml.
          kubectl --insecure-skip-tls-verify=true set image deployment/cinevision-server server=$IMAGE_TAG
          
          # 3. Wait for the rollout to finish successfully (zero downtime deploy)
          kubectl --insecure-skip-tls-verify=true rollout status deployment/cinevision-server --timeout=90s
