name: Deploy Backend to K3s

# Trigger the workflow when code is pushed to the 'main' branch
# and only when files in the 'server' or 'k8s' directories change.
on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          # Tags the image with both the commit SHA (for versioning) and 'latest'
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        # We write the KUBE_CONFIG secret to a temporary file for kubectl to use
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s Cluster
        env:
          IMAGE_TAG: ${{ secrets.DOCKERHUB_USERNAME }}/cinevision-server:${{ github.sha }}
        run: |
          # The Free Tier 1GB EC2 instance often struggles to handle complex remote
          # kubectl apply commands because it attempts to download the entire K8s OpenAPI schema,
          # leading to TLS handshake timeouts.
          
          # Since the infrastructure/YAML rarely changes, we bypass 'kubectl apply' here.
          # We only need to tell the cluster to use the new Docker image we just built.
          # This is a very tiny, fast API request.
          
          echo "Updating deployment image to $IMAGE_TAG..."
          
          # We wrap this in a retry loop because AWS Free Tier instances occasionally stall for a few seconds.
          for i in {1..3}; do
            if kubectl --insecure-skip-tls-verify=true --request-timeout=60s set image deployment/cinevision-server server=$IMAGE_TAG; then
              echo "✅ Successfully triggered zero-downtime deployment."
              break
            else
              echo "⚠️ Failed to reach K3s cluster. Retrying in 15 seconds... ($i/3)"
              sleep 15
            fi
            
            # If we reach the 3rd iteration and it still fails, exit with error
            if [ $i -eq 3 ]; then
              echo "❌ Error: Could not reach K3s to update the image. Your EC2 CPU might be completely exhausted."
              exit 1
            fi
          done
          
          echo "Waiting for rollout to finish (Zero Downtime)..."
          kubectl --insecure-skip-tls-verify=true --request-timeout=5m rollout status deployment/cinevision-server --timeout=120s
