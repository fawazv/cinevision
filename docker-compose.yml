# docker-compose.yml — Local testing harness for CineVision Backend
#
# Run with: docker compose up --build
# Stop with: docker compose down
#
# What this does:
#   - Builds the backend server Docker image from its Dockerfile
#   - Runs it locally on port 5000 so your frontend (Vite/Vercel) can connect

services:

  # ── Backend API (Express) ────────────────────────────────────
  server:
    build:
      context: ./server # Use server/Dockerfile
      dockerfile: Dockerfile
    container_name: cinevision-server

    # Map port 5000 inside to port 5000 outside for local frontend connection
    ports:
      - "5000:5000"

    # Load environment variables from the server's .env file.
    env_file:
      - ./server/.env

    # Override specific vars for the Docker context
    environment:
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173 # Default Vite dev port

    # Auto-restart the server if it crashes
    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
