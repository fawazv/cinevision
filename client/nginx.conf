# Nginx config for the CineVision React SPA
#
# Two critical jobs:
# 1. Proxy ALL /api/* requests to the backend container (so the frontend
#    doesn't need to know the server's address).
# 2. Serve React Router correctly — any unknown URL must return index.html
#    so that React Router can handle it on the client side.
#    Without this, refreshing /projects would return a 404 from Nginx.

server {
    listen 80;
    server_name _;

    # Serve static files from the build output directory
    root /usr/share/nginx/html;
    index index.html;

    # ── API Proxy ─────────────────────────────────────────────
    # Forward /api/* to the backend service.
    # In Docker Compose: "server" is the service name and acts as the hostname.
    # In Kubernetes: this would be the backend ClusterIP service name.
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;

        # Required for WebSocket support (future Socket.IO use)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward the real client IP to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # ── React Router SPA Fallback ─────────────────────────────
    # Try to serve the file directly, then as a directory index,
    # then fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caching for static assets ─────────────────────────────
    # Tell browsers to cache JS/CSS/images for 1 year.
    # Vite hashes filenames on build, so this is safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
